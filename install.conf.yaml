- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.tmux.conf: tmux.conf
    ~/.config/alacritty: config/alacritty
    ~/.zshrc: zshrc
    ~/.config/ranger: config/ranger
    ~/.thinkvim.d: thinkvim.d
    ~/.doom.d: doom.d

- shell:
  - [git submodule update --init --recursive, Installing submodules]
