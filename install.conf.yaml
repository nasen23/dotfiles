- defaults:
    link:
      relink: true

- clean: ['~']

- link:
    ~/.dotfiles: ''
    ~/.tmux.conf: tmux.conf
    ~/.config/alacritty: config/alacritty
    ~/.config/fish: config/fish
    ~/.config/dunst: config/dunst
    ~/.zshrc: zshrc
    ~/.doom.d: doom.d

- shell:
  - [git submodule update --init --recursive, Installing submodules]
